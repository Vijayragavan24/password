{% extends "base.html" %}

{% block title %}Server Error{% endblock %}

{% block content %}
<div class="error-page" style="min-height: 100vh; display: flex; align-items: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
    <div class="container text-center">
        <div style="color: white;">
            <h1 style="font-size: 6rem; font-weight: 700; margin-bottom: 1rem;">500</h1>
            <h2 class="mb-3">Server Error</h2>
            <p class="mb-4 fs-5">Oops! Something went wrong on the server. Please try again later.</p>
            <a href="{{ url_for('welcome') }}" class="btn btn-light btn-lg">
                <i class="fas fa-home"></i> Go Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
