{% extends "base.html" %}

{% block title %}Forgot Password - Password Detection Tool{% endblock %}

{% block content %}
<div class="auth-page" style="min-height: 100vh; display: flex; align-items: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7">
                <div class="auth-card" data-aos="zoom-in">
                    <div class="auth-header text-center mb-4">
                        <i class="fas fa-key fa-3x text-warning mb-3"></i>
                        <h2 class="mb-2">Forgot Password?</h2>
                        <p class="text-muted">Recover your account in a few steps</p>
                    </div>

                    <form id="forgotForm">
                        <div class="mb-4">
                            <label for="identifier" class="form-label">Username or Email</label>
                            <input type="text" class="form-control form-control-lg" id="identifier" name="identifier" placeholder="Enter your username or email" required>
                            <small class="form-text text-muted">We'll help you recover your account</small>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">
                            <i class="fas fa-check"></i> Continue
                        </button>

                        <p class="text-center text-muted">
                            Remember your password? <a href="{{ url_for('login') }}" class="text-primary fw-bold">Sign in</a>
                        </p>
                    </form>

                    <div id="alertContainer"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('forgotForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const formData = {
        identifier: document.getElementById('identifier').value
    };

    try {
        const response = await fetch('{{ url_for("forgot_password") }}', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
        });

        const data = await response.json();

        if (data.success) {
            setTimeout(() => {
                window.location.href = '{{ url_for("security_verification") }}';
            }, 1000);
        } else {
            showAlert(data.error, 'danger');
        }
    } catch (error) {
        showAlert('An error occurred. Please try again.', 'danger');
    }
});

function showAlert(message, type) {
    const alertContainer = document.getElementById('alertContainer');
    alertContainer.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show mt-3" role="alert">
        ${message}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>`;
}
</script>

<style>
.auth-card {
    background: white;
    border-radius: 20px;
    padding: 2.5rem;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
}

.form-control {
    border: 2px solid #e9ecef;
    border-radius: 10px;
}

.form-control:focus {
    border-color: #667eea;
    box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
}

.btn-primary {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border: none;
    border-radius: 10px;
}
</style>
{% endblock %}
