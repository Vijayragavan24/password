{% extends "base.html" %}

{% block title %}Security Verification - Password Detection Tool{% endblock %}

{% block content %}
<div class="auth-page" style="min-height: 100vh; display: flex; align-items: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                <div class="auth-card" data-aos="zoom-in">
                    <div class="auth-header text-center mb-4">
                        <i class="fas fa-question-circle fa-3x text-info mb-3"></i>
                        <h2 class="mb-2">Answer Security Questions</h2>
                        <p class="text-muted">Verify your identity to reset your password</p>
                    </div>

                    <form id="securityForm">
                        <div class="mb-3">
                            <label for="motherName" class="form-label">What is your mother's name?</label>
                            <input type="text" class="form-control form-control-lg" id="motherName" name="mother_name" placeholder="Your mother's name" required>
                        </div>

                        <div class="mb-3">
                            <label for="dob" class="form-label">What is your date of birth?</label>
                            <input type="date" class="form-control form-control-lg" id="dob" name="date_of_birth" required>
                        </div>

                        <div class="mb-4">
                            <label for="favoriteColor" class="form-label">What is your favorite color?</label>
                            <input type="text" class="form-control form-control-lg" id="favoriteColor" name="favorite_color" placeholder="Your favorite color" required>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">
                            <i class="fas fa-check"></i> Verify Answers
                        </button>

                        <p class="text-center text-muted">
                            <a href="{{ url_for('forgot_password') }}" class="text-primary fw-bold">Back to password recovery</a>
                        </p>
                    </form>

                    <div id="alertContainer"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('securityForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const formData = {
        mother_name: document.getElementById('motherName').value,
        date_of_birth: document.getElementById('dob').value,
        favorite_color: document.getElementById('favoriteColor').value
    };

    try {
        const response = await fetch('{{ url_for("security_verification") }}', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
        });

        const data = await response.json();

        if (data.success) {
            showAlert('Verification successful! Redirecting...', 'success');
            setTimeout(() => {
                window.location.href = '{{ url_for("reset_password") }}';
            }, 1500);
        } else {
            showAlert(data.error, 'danger');
        }
    } catch (error) {
        showAlert('An error occurred. Please try again.', 'danger');
    }
});

function showAlert(message, type) {
    const alertContainer = document.getElementById('alertContainer');
    alertContainer.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show mt-3" role="alert">
        ${message}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>`;
}
</script>

<style>
.auth-card {
    background: white;
    border-radius: 20px;
    padding: 2.5rem;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
}

.form-control {
    border: 2px solid #e9ecef;
    border-radius: 10px;
}

.form-control:focus {
    border-color: #667eea;
    box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
}

.btn-primary {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border: none;
    border-radius: 10px;
}
</style>
{% endblock %}
